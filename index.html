// 系統狀態

let appData = [];

let manuallyEditedCount = 0;

  

// Toast 顯示

function showToast(message) {

const toast = document.getElementById("toast");

const text = document.getElementById("toastText");

text.innerText = message;

toast.classList.remove("translate-y-20", "opacity-0");

toast.classList.add("translate-y-0", "opacity-100");

setTimeout(() => {

toast.classList.remove("translate-y-0", "opacity-100");

toast.classList.add("translate-y-20", "opacity-0");

}, 2500);

}

  

// 格式化大小寫

function applyCase(text, format) {

if (!text) return "";

if (format === "upper") return text.toUpperCase();

if (format === "lower") return text.toLowerCase();

if (format === "title") {

return text.split('-').map(part => {

if (!part) return "";

return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();

}).join('-');

}

return text;

}

  

// 單字拼音轉換

function convertChar(char, system) {

if (PINYIN_DB[char]) {

return PINYIN_DB[char][system] || char;

}

// 如果沒有比對到，回傳空字串，待使用者在表格內點選編輯手動修正

return "";

}

  

// 主要轉譯核心

function processInput() {

const text = document.getElementById("nameInput").value.trim();

const system = document.getElementById("pinyinSystem").value;

const caseFormat = document.getElementById("caseFormat").value;

const separatorSelect = document.getElementById("nameSeparator").value;

  

// 連字號解析

let sep = "-";

if (separatorSelect === "space") sep = " ";

if (separatorSelect === "none") sep = "";

  

if (!text) {

appData = [];

renderTable();

updateStats();

return;

}

  

// 解析多行姓名

const lines = text.split(/[\n,，\s\t]+/).filter(line => line.trim() !== "");

// 姓名去重

const uniqueNames = Array.from(new Set(lines));

  

let hitCount = 0;

let totalChars = 0;

  

appData = uniqueNames.map((name, index) => {

const cleanName = name.replace(/[^\u4e00-\u9fa5]/g, ''); // 僅保留中文字

if (cleanName.length === 0) return null;

  

// 拆分姓與名（目前主要處理常見單姓如 陳依婷 -> 陳 / 依婷）

let lastNameCN = cleanName.charAt(0);

let firstNameCN = cleanName.substring(1);

  

// 複姓與特殊姓氏處理（如有需要）

const doubleSurnames = ["司馬", "歐陽", "諸葛", "端木", "上官"];

if (cleanName.length >= 3 && doubleSurnames.includes(cleanName.substring(0, 2))) {

lastNameCN = cleanName.substring(0, 2);

firstNameCN = cleanName.substring(2);

}

  

// 英文姓轉譯

const rawLastNameEN = convertChar(lastNameCN, system);

if (rawLastNameEN) hitCount++;

totalChars++;

  

// 英文名轉譯

const nameChars = firstNameCN.split("");

const rawFirstNameENArray = nameChars.map(char => {

const pyChar = convertChar(char, system);

if (pyChar) hitCount++;

totalChars++;

return pyChar || `[${char}]`; // 缺漏字標示

});

  

// 組裝英文名連字

const rawFirstNameEN = rawFirstNameENArray.join("-");

  

// 格式化最後大小寫及連字

let lastNameEN = applyCase(rawLastNameEN, caseFormat);

let firstNameEN = applyCase(rawFirstNameEN, caseFormat);

  

// 套用連接字元

if (sep !== "-") {

firstNameEN = firstNameEN.replace(/-/g, sep);

}

  

return {

id: index + 1,

name: cleanName,

lastNameCN: lastNameCN,

firstNameCN: firstNameCN,

lastNameEN: lastNameEN || `請點選修改`,

firstNameEN: firstNameEN || `請點選修改`

};

}).filter(item => item !== null);

  

// 更新精確度

const matchRate = totalChars > 0 ? Math.round((hitCount / totalChars) * 100) : 100;

document.getElementById("statSuccess").innerText = `${matchRate}%`;

  

renderTable();

updateStats();

}

  

// 渲染資料表格

function renderTable() {

const tbody = document.getElementById("resultBody");

const noDataState = document.getElementById("noDataState");

tbody.innerHTML = "";

  

if (appData.length === 0) {

noDataState.classList.remove("hidden");

return;

} else {

noDataState.classList.add("hidden");

}

  

appData.forEach(item => {

const row = document.createElement("tr");

row.className = "hover:bg-slate-50 transition-colors";

// 是否含有缺失值的警示樣式

const missingENName = item.firstNameEN.includes("[");

const missingENLast = item.lastNameEN === "請點選修改";

  

row.innerHTML = `

<td class="py-3 px-4 text-center font-medium text-slate-400">${item.id}</td>

<td class="py-3 px-4 font-bold text-slate-950">${item.name}</td>

<td class="py-3 px-4 text-slate-600">${item.firstNameCN}</td>

<td class="py-3 px-4 cursor-pointer hover:bg-slate-100 transition-colors select-none group" title="點擊直接修改" onclick="makeEditable(this, ${item.id}, 'firstNameEN')">

<span class="inline-flex items-center ${missingENName ? 'text-amber-600 bg-amber-50 px-2 rounded' : 'text-slate-900'}">

<span class="cell-text">${item.firstNameEN}</span>

<svg class="w-3 h-3 ml-2 text-slate-300 group-hover:text-slate-500 opacity-0 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>

</span>

</td>

<td class="py-3 px-4 cursor-pointer hover:bg-slate-100 transition-colors select-none group" title="點擊直接修改" onclick="makeEditable(this, ${item.id}, 'lastNameEN')">

<span class="inline-flex items-center ${missingENLast ? 'text-amber-600 bg-amber-50 px-2 rounded' : 'text-slate-900'}">

<span class="cell-text">${item.lastNameEN}</span>

<svg class="w-3 h-3 ml-2 text-slate-300 group-hover:text-slate-500 opacity-0 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>

</span>

</td>

`;

tbody.appendChild(row);

});

}

  

// 變更為編輯狀態

function makeEditable(element, id, field) {

if (element.querySelector('input')) return; // 避免重疊觸發

const cellTextEl = element.querySelector('.cell-text');

const currentText = cellTextEl.innerText;

element.innerHTML = "";

  

const input = document.createElement("input");

input.type = "text";

input.value = currentText.includes("請點選修改") ? "" : currentText;

input.className = "w-full bg-white border border-primary-500 rounded px-2 py-1 text-slate-900 focus:outline-none focus:ring-1 focus:ring-primary-500 font-medium";

element.appendChild(input);

input.focus();

  

const saveChanges = () => {

const newText = input.value.trim().toUpperCase(); // 預設強制在編輯後轉換為最主流的大寫

// 更新狀態

const record = appData.find(item => item.id === id);

if (record && record[field] !== newText && newText !== "") {

record[field] = newText;

manuallyEditedCount++;

showToast(`已更新 序號 ${id} 的英文對照`);

}

  

// 重新渲染

renderTable();

updateStats();

};

  

// 事件監聽

input.addEventListener("blur", saveChanges);

input.addEventListener("keydown", (e) => {

if (e.key === "Enter") saveChanges();

if (e.key === "Escape") {

input.removeEventListener("blur", saveChanges);

renderTable();

}

});

}

  

// 更新儀表板統計

function updateStats() {

document.getElementById("statTotal").innerText = appData.length;

document.getElementById("statEdited").innerText = manuallyEditedCount;

}

  

// 匯出 CSV 檔案

function exportToCSV() {

if (appData.length === 0) {

showToast("目前無任何姓名資料可匯出！");

return;

}

  

const headers = ["序號", "中文姓名", "中文姓", "中文名", "英文名", "英文姓"];

let csvContent = "\uFEFF"; // 關鍵：UTF-8 BOM 防 Excel 亂碼

csvContent += headers.join(",") + "\r\n";

appData.forEach(item => {

let row = [

item.id,

`"${item.name}"`,

`"${item.lastNameCN}"`,

`"${item.firstNameCN}"`,

`"${item.firstNameEN}"`,

`"${item.lastNameEN}"`

];

csvContent += row.join(",") + "\r\n";

});

  

const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });

const link = document.createElement("a");

const url = URL.createObjectURL(blob);

link.setAttribute("href", url);

link.setAttribute("download", `護照姓名拼音對照表_${getFormattedDate()}.csv`);

link.style.visibility = 'hidden';

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

showToast("CSV 匯出成功！");

}

  

// 匯出 XLSX 檔案

function exportToXLSX() {

if (appData.length === 0) {

showToast("目前無任何姓名資料可匯出！");

return;

}

  

// 轉換為符合 SheetJS 的格式

const tableData = appData.map(item => ({

"序號": item.id,

"中文姓名": item.name,

"中文姓": item.lastNameCN,

"中文名": item.firstNameCN,

"英文名 (Given Name)": item.firstNameEN,

"英文姓 (Surname)": item.lastNameEN

}));

  

const worksheet = XLSX.utils.json_to_sheet(tableData);

const workbook = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook, worksheet, "姓名對照表");

// 匯出檔案

XLSX.writeFile(workbook, `護照姓名拼音對照表_${getFormattedDate()}.xlsx`);

showToast("Excel XLSX 匯出成功！");

}

  

// 取得時間戳

function getFormattedDate() {

const d = new Date();

return `${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2, '0')}${d.getDate().toString().padStart(2, '0')}`;

}

  

// 初始化載入

window.onload = function() {

processInput();

}

</script>
